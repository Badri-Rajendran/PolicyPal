# PolicyPal — Alembic configuration

[alembic]
# path to migration scripts
script_location = migrations

# add the project root to sys.path so env.py can import `policypal`
prepend_sys_path = .

# template for naming new migration files (date prefix → chronological sort).
# percent signs are doubled (%%) because ConfigParser interpolates them.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# path separator for version_locations / prepend_sys_path.
# "os" uses os.pathsep — the default for new projects (Alembic 1.16+);
# omitting it triggers a DeprecationWarning.
path_separator = os

# where migration files live (defaults to <script_location>/versions)
version_locations = %(here)s/migrations/versions

# use UTC for migration timestamps
timezone = UTC

# truncate the "slug" portion of the filename
truncate_slug_length = 40

# DATABASE URL — placeholder only.
# The real URL is injected in migrations/env.py from your Pydantic settings,
# so no credentials are committed to the repo.
sqlalchemy.url = driver://user:pass@localhost/dbname


# Auto-format generated migrations with ruff.
# Commented out until ruff is installed — uncomment once `uv add --dev ruff` succeeds.
# [post_write_hooks]
# hooks = ruff_format
# ruff_format.type = console_scripts
# ruff_format.entrypoint = ruff
# ruff_format.options = format REVISION_SCRIPT_FILENAME


# ── Logging (Alembic CLI only — separate from your app's logger) ─────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S