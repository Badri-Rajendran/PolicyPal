services:
  db:
    image: pgvector/pgvector:pg16
    container_name: policypal_db
    environment:
      POSTGRES_USER: policypal
      POSTGRES_PASSWORD: policypal
      POSTGRES_DB: policypal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policypal -d policypal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: